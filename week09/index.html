<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 09</title>

    <style>
        #weather-box {
            background-color: #ff8c00; /* Bright orange */
            color: white;
            padding: 20px;
            border-radius: 10px;
            width: 400px;
            font-family: sans-serif;
            position: relative;
        }

        #weather-box h2 {
            margin-top: 0;
            font-weight: normal;
        }

        #weather-icon {
            position: absolute;
            right: 40px;
            bottom: 20px;
            font-size: 50px;
        }
    </style>
</head>
<body>
    <div id="weather-box">
        <h2>Current Weather</h2>
        <div class="row">
            <div class="col-md-6">
                <p>Precipitation:<span id="precipitation"></span></p>
                <p>Temperature: <span id="temperature"></span></p>
            </div>
            <div class="col-md-6 emoj">
                <div id="weather-icon"></div>
            </div>
        </div>
    </div>
    <script>
        const url = "https://api.open-meteo.com/v1/forecast?latitude=43.0481&longitude=-76.1474&current=temperature_2m,precipitation,cloud_cover&temperature_unit=fahrenheit&windspeed_unit=mph&precipitation_unit=inch";

        async function getWeather() {
            try {
                const response = await fetch(url);
                const data = await response.json(); 

                console.log(data);

                document.getElementById('precipitation').textContent = " " + data.current.precipitation + '"';
                document.getElementById('temperature').textContent = " " + Math.round(data.current.temperature_2m) + '°F';

                const cloudIcon = document.getElementById('weather-icon');
                
                if (data.current.cloud_cover > 50) {
                    cloudIcon.textContent = '☁️'; 
                } else {
                    cloudIcon.textContent = '☀️'; 
                }
            
            } catch (error) {
                console.error("Error fetching weather data:", error);
            }
        }

        getWeather();
    </script>
</body>
</html>
